<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralScreen - Movies, TV Shows & People</title>
<meta name="description" content="Watch trending movies, TV Shows and discover popular people powered by TMDB.">
<meta name="keywords" content="movies,tv shows,trending,tmdb,trailer,actor,film">
<meta name="author" content="ViralScreen">
<meta name="robots" content="index,follow">
<meta name="theme-color" content="#020617">
<link rel="icon" href="favicon.png">
<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="navbar">
<div class="logo" onclick="goHome()">
🎬 <span>ViralScreen</span>
</div>
<nav class="nav-links">
<a onclick="goHome()">Home</a>
<a onclick="loadMovies()">Movies</a>
<a onclick="loadTV()">TV Shows</a>
<a onclick="loadPeople()">People</a>
</nav>
<button
class="menu-btn"
onclick="toggleMenu()">
</button>
</header>
<section
id="hero"
class="hero">
<div class="hero-content">
<h1
id="heroTitle"
class="hero-title">
Loading...
</h1>
<p
id="heroOverview"
class="hero-overview">
Loading...
</p>
<div class="hero-meta">
<span id="heroRating">
⭐ 0.0
</span>
<span id="heroYear">

2026

</span>

</div>

<div class="hero-buttons">

<button
class="btn btn-primary"
onclick="playHeroTrailer()">

▶ Watch Trailer

</button>

<button
class="btn btn-secondary"
onclick="heroMoreInfo()">

More Info

</button>

</div>

<div
id="heroDots"
class="hero-dots">

</div>

</div>

</section>



<!-- ==========================
SEARCH
========================== -->

<div class="container">

<div class="search-box">

<input
id="searchInput"
type="text"
placeholder="Search movies, TV Shows or People...">

<button
onclick="searchMovie()">

🔍

</button>

</div>

</div>



<!-- ==========================
MAIN CONTENT
========================== -->

<main
id="app"
class="container">

<section class="section">

<div class="section-header">

<h2 class="section-title">

🔥 Trending Movies

</h2>

</div>

<div
id="trendingRow"
class="row">

<div class="loading">

Loading...

</div>

</div>

</section>



<section class="section">

<div class="section-header">

<h2 class="section-title">

🎬 Popular Movies

</h2>

</div>

<div
id="popularRow"
class="row">

<div class="loading">

Loading...

</div>

</div>

</section>



<section class="section">

<div class="section-header">

<h2 class="section-title">

📺 Top Rated TV Shows

</h2>

</div>

<div
id="tvRow"
class="row">

<div class="loading">

Loading...

</div>

</div>

</section>



<section class="section">

<div class="section-header">

<h2 class="section-title">

👤 Popular People

</h2>

</div>

<div
id="peopleRow"
class="row">

<div class="loading">

Loading...

</div>

</div>

</section>

</main>



<!-- ==========================
TOAST
========================== -->

<div
id="toast"
style="
display:none;
position:fixed;
left:50%;
bottom:30px;
transform:translateX(-50%);
background:#0f172a;
padding:12px 22px;
border-radius:12px;
color:#fff;
z-index:999999;
box-shadow:0 10px 30px rgba(0,0,0,.45);
">

</div>



<!-- ==========================
SCROLL TOP
========================== -->

<button
id="scrollTop"
class="scroll-top"
onclick="scrollTopSmooth()">

↑

</button>



<!-- ==========================
JAVASCRIPT
========================== -->

<script src="app.js"></script>

</body>

</html>
